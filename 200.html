<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Ptrns - Personal Chrome Extenstion</title>
	<link rel="stylesheet" href="./css/main.css">
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

	<div class="s-container">
		<div class="sidebar">
			<nav class="nav">
				<ul class="nav-wrap">
					<li><a href="#" class="cat-btn" data-cat="top-headlines?country=us">news</a></li>
					<li><a href="#" class="cat-btn" data-cat="top-headlines?country=us&category=technology">tech</a></li>
					<li><a href="#" class="cat-btn" data-cat="top-headlines?country=us&category=entertainment">entertainment</a></li>
					<li><a href="#" class="cat-btn" data-cat="top-headlines?country=us&category=business">business</a></li>
					<li><a href="#" class="cat-btn" data-cat="top-headlines?country=us&category=sports">sports</a></li>
					<li><a href="#" class="cat-btn" data-cat="top-headlines?country=us&category=science">science</a></li>
					<li><a href="#" class="cat-btn" data-cat="top-headlines?country=us&category=health">health</a></li>
					<li><a href="#" class="cat-btn" data-cat="reddit">reddit</a></li>
				</ul>
			</nav>
			<form action="#" class="search-form" id="search-form">
				<div class="search-container">
					<input type="text" class="search" placeholder="search for more news">
				</div>
			</form>
		</div>
		<div class="main-content">
			<header class="header">
				<i class="material-icons toggle-menu">menu</i>
				<h1 class="logo">ptrns - Hello, <span class="username" contenteditable="true">(Click to save name here)</span></h1>
				<h4 class="date"></h4>
			</header>
			<div class="articles-wrap">
			</div>
		</div>
		<div class="article-preview">
		</div>
	</div>

	
	<script src="./js/jquery.min.js"></script>
	<script src="./js/moment.min.js"></script>
	<script src="./js/app.js" defer></script>
</body>
</html>
